specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Brocade
providerId: brocade
publisherName: Brocade
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Data Center
  - Directors
  - Fibre Channel
  - Network Automation
  - Networking
  - SAN
  - Storage Area Networks
  - Switches
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Brocade API surface. Provides a FOCUS-aligned mapping
  for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Brocade
  ServiceCategory: Developer Tools / API
  ProviderName: Brocade
  PublisherName: Brocade
  InvoiceIssuerName: Brocade
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Brocade Fabric OS REST API
    baseURL: https://{switch-ip}/rest
    tags:
      - Fabric OS
      - Fibre Channel
      - Network Management
      - SAN
      - Switches
    serviceName: Brocade Fabric OS REST API
    serviceCategory: API
  - name: Brocade SANnav Management Portal REST API
    baseURL: https://{sannav-host}/external-api/v1
    tags:
      - Discovery
      - Fibre Channel
      - Monitoring
      - SAN Management
      - Zoning
    serviceName: Brocade SANnav Management Portal REST API
    serviceCategory: API
  - name: Brocade SANnav Northbound Streaming API
    baseURL: https://{sannav-host}/external-api/v1/stream
    tags:
      - Events
      - Monitoring
      - SAN Management
      - Streaming
      - Telemetry
    serviceName: Brocade SANnav Northbound Streaming API
    serviceCategory: API
  - name: Brocade Network Advisor REST API
    baseURL: https://{bna-host}/rest
    tags:
      - Analytics
      - Deprecated
      - Monitoring
      - SAN Management
    serviceName: Brocade Network Advisor REST API
    serviceCategory: API
  - name: Brocade Workflow Composer API
    baseURL: https://{bwc-host}/api/v1
    tags:
      - Automation
      - Deprecated
      - Orchestration
      - Workflow
    serviceName: Brocade Workflow Composer API
    serviceCategory: API
  - name: Brocade VCS Fabric API
    baseURL: https://{switch-ip}/rest
    tags:
      - Deprecated
      - Fabric
      - Switching
      - VCS
    serviceName: Brocade VCS Fabric API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
